[env:esp32]
platform  = espressif32
board     = esp32dev
framework = arduino

; Vitesse port série
monitor_speed = 115200

; Taille partition (pour SD + libs lourdes) 
board_build.partitions = default.csv

; Flags de compilation 
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM

; Bibliothèques 
; Chaque lib est versionnée pour éviter les régressions
lib_deps =
    ; Capteur CO2 SCD30
    sparkfun/SparkFun SCD30 Arduino Library @ ^1.0.20

    ; Protocole MQTT
    knolleary/PubSubClient @ ^2.8.0

    ; Sérialisation JSON
    bblanchon/ArduinoJson @ ^7.0.0

    ; GPS (source temps de secours)
    mikalhart/TinyGPSPlus @ ^1.0.3

    ; Ethernet LAN8720 (driver natif ESP32)
    ; Inclus dans le framework espressif32 — pas de lib externe requise

; Options upload 
upload_speed = 921600
